version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: gestao_contratos_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - '9090:9090'
    networks:
      - app_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: gestao_contratos_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - '3000:3000'
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app_network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: gestao_contratos_loki
    ports:
      - '3100:3100'
    networks:
      - app_network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: gestao_contratos_promtail
    volumes:
      - /var/log:/var/log
    command: -config.file=/etc/promtail/config.yml
    networks:
      - app_network
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  app_network:
    external: true
