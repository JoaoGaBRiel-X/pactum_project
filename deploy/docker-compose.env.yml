version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME}_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-gestao_contratos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME}_redis
    networks:
      - app_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ${PROJECT_NAME}_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-password}
    networks:
      - app_network
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    container_name: ${PROJECT_NAME}_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app_network
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ${PROJECT_NAME}_gotenberg
    networks:
      - app_network
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: ${PROJECT_NAME}_mailpit
    environment:
      MP_MAX_MESSAGES: 500
    networks:
      - app_network
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ${PROJECT_NAME}_backend:latest
    container_name: ${PROJECT_NAME}_backend
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-gestao_contratos}?schema=public"
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://${RABBITMQ_DEFAULT_USER:-admin}:${RABBITMQ_DEFAULT_PASS:-password}@rabbitmq:5672"
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: "lefer-saas-bucket"
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      GOTENBERG_URL: "http://gotenberg:3000"
      # Outras vars de ambiente...
    networks:
      - app_network
      - traefik_network
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - rabbitmq
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME}-api.rule=Host(`${BACKEND_DOMAIN}`) || Host(`${BACKEND_DOMAIN}:8000`)"
      - "traefik.http.routers.${PROJECT_NAME}-api.entrypoints=web"
      - "traefik.http.services.${PROJECT_NAME}-api.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik_network"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
    image: ${PROJECT_NAME}_frontend:latest
    container_name: ${PROJECT_NAME}_frontend
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
    networks:
      - app_network
      - traefik_network
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME}-web.rule=Host(`${FRONTEND_DOMAIN}`) || Host(`${FRONTEND_DOMAIN}:8000`)"
      - "traefik.http.routers.${PROJECT_NAME}-web.entrypoints=web"
      - "traefik.http.services.${PROJECT_NAME}-web.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik_network"

volumes:
  postgres_data:
  minio_data:

networks:
  app_network:
    driver: bridge
  traefik_network:
    external: true
    name: traefik_network
