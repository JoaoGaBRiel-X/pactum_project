
services:
  postgres:
    image: postgres:15-alpine
    container_name: gestao_contratos_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-gestao_contratos}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gestao_contratos_redis
    ports:
      - '6379:6379'
    networks:
      - app_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: gestao_contratos_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-password}
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - app_network
    restart: unless-stopped

  traefik:
    image: traefik:v2.10
    container_name: gestao_contratos_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - '80:80'
      - '8080:8080' # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app_network
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    container_name: gestao_contratos_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    networks:
      - app_network
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: gestao_contratos_gotenberg
    ports:
      - '3001:3000'
    networks:
      - app_network
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  app_network:
    driver: bridge
